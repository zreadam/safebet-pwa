<script>
  // Scale the phone so the whole device fits and stays dead-centered.
  function fitPhone() {
    var el = document.querySelector('.phone');
    var root = document.getElementById('root');
    if (!el) return;
    var pad = 24;
    var s = Math.min((window.innerWidth - pad) / 390, (window.innerHeight - pad) / 844, 1);
    document.documentElement.style.setProperty('--phone-scale', s);
    root.style.width  = (390 * s) + 'px';
    root.style.height = (844 * s) + 'px';
  }
  window.addEventListener('resize', fitPhone);
  var _fit = setInterval(function() {
    if (document.querySelector('.phone')) { fitPhone(); clearInterval(_fit); }
  }, 80);
</script>
